apiVersion: apps/v1
kind: Deployment
metadata:
  name: development-shell
  labels:
    app: development-shell
spec:
  replicas: 1
  # Recreate, not RollingUpdate: two pods sharing one SSH identity/workdir
  # makes no sense, and the agent should reconnect rather than hit a twin.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: development-shell
  template:
    metadata:
      labels:
        app: development-shell
    spec:
      automountServiceAccountToken: false
      hostUsers: false
      securityContext:
        fsGroup: 1000
      containers:
        - name: development-shell
          image: ghcr.io/sigurs/agent-container-development-shell:latest
          imagePullPolicy: Always
          ports:
            - name: ssh
              containerPort: 2222
              protocol: TCP
          envFrom:
            - secretRef:
                name: development-shell
          securityContext:
            # sshd itself runs as 'agent' — no root, no capabilities at all.
            # A non-root sshd can only authenticate sessions as its own uid,
            # so the single-user restriction is kernel-enforced.
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            # SSH host identity. emptyDir = new host key on every pod
            # recreation (known_hosts churn for the agent). Swap for a PVC
            # when you can add one.
            - name: host-keys
              mountPath: /etc/ssh/host_keys
            # Agent workspace — same caveat: emptyDir does not survive the pod.
            - name: work
              mountPath: /home/agent/work
          startupProbe:
            tcpSocket:
              port: ssh
            periodSeconds: 2
            failureThreshold: 15
          readinessProbe:
            tcpSocket:
              port: ssh
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: ssh
            periodSeconds: 20
            failureThreshold: 3
      volumes:
        - name: host-keys
          emptyDir: {}
        - name: work
          emptyDir:
            sizeLimit: 5Gi
      terminationGracePeriodSeconds: 30